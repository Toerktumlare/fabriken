syntax = "proto3";

package build;

message BuildDef {
  repeated StepDef steps = 1;
  map<string, string> env = 2;
  Context context = 3;
}

message StepDef {
  string name = 1;
  optional string image = 2; 
  repeated string run = 3;
  repeated string depends_on = 4;
  map<string, string> env = 5;
  Containerize containerize = 6;
}

message Context {
  string project_root = 1;
}

message Containerize {
  Builder builder = 1;
  string file = 2;
  string context = 3; 
  string image = 4;
}


enum Builder {
  PODMAN = 0;
  DOCKER = 1;
  BUILDAH = 2;
}

message BuildStart {
  // string build_id = 1;
  // string timestamp = 2;
}

message LogEntry {
  string step = 1;
  string line = 2;
  StreamType stream_type = 3;
}

message BuildEnd {
  // bool success = 1;
  // string exit_code = 2;
}

message EmptyEvent {}

message BuildUpdate {
  oneof update_type {
    BuildStart start = 1;
    LogEntry log = 2;
    BuildEnd end = 3;
    EmptyEvent pulling_image = 4;
    EmptyEvent image_fetched = 5;
    EmptyEvent step_started = 6;
    EmptyEvent step_ended = 7;
    EmptyEvent containerizing_started = 8;
    EmptyEvent containerizing_done = 9;
  }
}

enum StreamType {
  STREAM_TYPE_UNSPECIFIED = 0;
  STREAM_TYPE_STDOUT = 1;
  STREAM_TYPE_STDERR = 2;
}
